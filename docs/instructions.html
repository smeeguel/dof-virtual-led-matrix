  <script id="md-source" type="text/plain"># Virtual DOF Matrix Tester Instructions

This guide is for testers validating the Virtual DOF Matrix named-pipe package.

---

## Before You Start

### What this test package is
The package adds a virtual RGB LED matrix viewer that receives output from DOF and displays it in a standalone window.

### What you need
- A Windows machine.
- Visual Pinball / front-end environment (VPX, Popper, or both).
- A working DOF installation (or willingness to install it now).
- The `.zip` test package I shared with you.

---

## 1) Install or Verify DOF

### If DOF is **already installed**
You can skip to **2) Apply files from the test .zip**.

### If DOF is **not installed yet**
Please install **both** DOF builds into `C:\DirectOutput`:

- **64-bit DOF** (used by VPX)
- **32-bit DOF** (used by Popper and other front ends)

Download source:

- http://mjrnet.org/pinscape/dll-updates.html#DOF

&gt; Why both? VPX and front-end launchers can load different bitness DLLs, so both are required for consistent testing.

---

## 2) Unzip the Test Package

Unzip my `.zip` anywhere you like.

Example location:

- `C:\vPin\VirtualLED`

You do **not** need to unzip into `C:\DirectOutput`; any folder is fine.

---

## 3) WhatŌĆÖs Inside the .zip

The package contains:

1. **Replacement `DirectOutput.dll` files**
   - one for `x64`
   - one for `x86`

2. **Sample `DirectOutput/Config` folder**
   - includes a known-good cabinet/config set for virtual matrix testing.

3. **Virtual matrix program**
   - executable (`.exe`)
   - `settings.json`
   - related runtime files.

4. **This documentation**

---

## 4) Replace DOF DLLs (Important)

1. Go to your DOF install:
   - `C:\DirectOutput\x64`
   - `C:\DirectOutput\x86`

2. In each folder, back up the original `DirectOutput.dll`.
   - Example:
     - `DirectOutput.dll` -&gt; `DirectOutput.dll.backup`

3. Copy the provided replacement DLLs from the `.zip` and overwrite:
   - replacement x64 DLL -&gt; `C:\DirectOutput\x64\DirectOutput.dll`
   - replacement x86 DLL -&gt; `C:\DirectOutput\x86\DirectOutput.dll`

If anything goes wrong, restore your backup DLLs.

---

## 5) Apply the Config Folder

### If you do **not** have an existing DOF cabinet setup
Copy everything from the sample `DirectOutput/Config` in the `.zip` into:

- `C:\DirectOutput\Config`

Allow overwrite when prompted.

### If you **already have** an existing DOF configuration
Please **do not blindly overwrite** your current config.

Contact me and IŌĆÖll help merge the virtual LED entries into your existing setup safely.

---

## 6) Run Order (Critical)

After DOF + DLL replacement is in place:

1. Launch the **virtual matrix `.exe` first**.
2. Then launch your front end or a VPX table.

The matrix app should already be running before any table starts.

---

## 7) Popper Script Integration (Show/Hide Control)

Good news: you have two clean ways to run this in Popper, depending on your preference.

### Command format

Use this command pattern in Popper scripts:

```bat
"C:\vPin\VirtualLED\VirtualDofMatrix.App.exe" --command <action> [optional args]
```

`C:\vPin\VirtualLED` is only an example path. Use the folder where **you** installed the app.

Supported actions:

- `show` - show + activate matrix rendering
- `hide` - hide + deactivate matrix rendering
- `frontend-return` - same behavior as `show`
- `table-launch [CUSTOM1] [CUSTOM2] [CUSTOM3] [CUSTOM4]`
  - Default behavior: hide matrix on table launch
  - Opt-in visible behavior: include `ShowVirtualLED` in any custom var
  - Opt-in hidden behavior: include `HideVirtualLED` in any custom var
- `table-launch --default-show-virtual-led [CUSTOM1] [CUSTOM2] [CUSTOM3] [CUSTOM4]`
  - For "always show except selected tables" setups
  - `HideVirtualLED` will hide only those selected tables

### Recommended Popper flow

1. **Popper Startup Script**  
   Launch the matrix app normally once:
   ```bat
   START "" "C:\vPin\VirtualLED\VirtualDofMatrix.App.exe"
   ```

2. **Choose one table-launch style (your preference):**

   **Choice A - Hide by default, opt-in to show on selected tables**  
   Use this if you only want the matrix active on specific tables.
   ```bat
   "C:\vPin\VirtualLED\VirtualDofMatrix.App.exe" --command table-launch "[CUSTOM1]" "[CUSTOM2]" "[CUSTOM3]" "[CUSTOM4]"
   ```
   - If none of those values contain `ShowVirtualLED`, matrix is hidden.
   - Add `ShowVirtualLED` in any `[CUSTOM#]` to keep it visible for that table.
   - `HideVirtualLED` is still honored and will force hidden.

   **Choice B - Show by default, opt-in to hide on selected tables**  
   Use this if you want the matrix visible most of the time.
   ```bat
   "C:\vPin\VirtualLED\VirtualDofMatrix.App.exe" --command table-launch --default-show-virtual-led "[CUSTOM1]" "[CUSTOM2]" "[CUSTOM3]" "[CUSTOM4]"
   ```
   - Matrix stays visible unless a custom var contains `HideVirtualLED`.
   - Add `HideVirtualLED` in any `[CUSTOM#]` for tables where you want it hidden.

3. **VPX Close Script (returning to Popper)**  
   Ensure matrix always reappears:
   ```bat
   "C:\vPin\VirtualLED\VirtualDofMatrix.App.exe" --command frontend-return
   ```

4. **Popper Exit Script**  
   Close the matrix app process:
   ```bat
   taskkill /IM "VirtualDofMatrix.App.exe" /F
   ```

### Optional explicit override

If you want explicit behavior regardless of custom vars:

```bat
"C:\vPin\VirtualLED\VirtualDofMatrix.App.exe" --command hide
"C:\vPin\VirtualLED\VirtualDofMatrix.App.exe" --command show
```

## 8) Quick Validation Checklist

Use this quick pass/fail checklist:

- [ ] Virtual matrix app opens successfully.
- [ ] Matrix window appears while in Popper/front-end.
- [ ] Launching a table hides matrix by default (no `ShowVirtualLED` custom var).
- [ ] Adding `ShowVirtualLED` in any custom var keeps matrix visible during table launch.
- [ ] (Optional default-show mode) Adding `HideVirtualLED` in any custom var hides only selected tables.
- [ ] Launching a table produces matrix activity.
- [ ] Colors/animations update while game events occur.
- [ ] Closing/reopening table returns matrix visibility in Popper.
- [ ] Popper/front-end path also works (if used).

Optional:
- [ ] Test VPX (64-bit path).
- [ ] Test front-end launcher (32-bit path).

## 9) Settings GUI Reference (every visible option)

Open the app settings window to access these controls.

## Display tab

### Dot Resolution
- **SD (32x8)**: sets width 32, height 8.
- **HD (64x16)**: sets width 64, height 16.
- **Ultra (128x32)**: sets width 128, height 32.
- **Custom**: unlocks manual Width + Height fields.

### Width / Height (Custom)
- Manual matrix LED dimensions.
- Must be positive integers.
- Product (`width * height`) must stay within safe cap (8800).

### Always on top
- Keeps matrix window above other windows.

### Dot shape
- **circle**: rounded LED look.
- **square**: pixel/block look.

### Visual quality
- **Low**: fastest path, reduced effects.
- **High**: fuller visual processing (tone mapping + temporal smoothing + bloom enabled).
- **Custom**: keeps hand-edited `settings.json` visual values.

### Renderer
- **gpu**: preferred hardware-accelerated renderer.
- **cpu**: software fallback renderer.
- If switching **GPU -> CPU** at runtime, the selection is saved and applied on next app restart for reliability.

### Reset to Defaults
- Resets only Display-tab options back to app defaults.

## DOF / Cabinet tab

### Cabinet.xml
- Read-only path box showing selected `Cabinet.xml`.
- **Browse...** button lets you pick a file manually.

### LedStrip toy
- Choose or type the target LedStrip toy name in `Cabinet.xml`.
- Typical value: `Matrix1`.

### Auto-update Cabinet.xml when resolution changes
- If enabled, applying/OK can write new width/height to the selected toy.

## Advanced tab

### Debug logging
- Enables protocol logging for troubleshooting.

### Log Frames
- Available when **Debug logging** is enabled.
- Controls per-frame pipe logs such as:
  - `Pipe frame seq=<n>, payload=<bytes> bytes.`
- Default is off (`false`) to keep logs concise.

## Footer buttons
- **OK**: apply + close.
- **Cancel**: close without applying new changes.

## 10) settings.json Reference (full field breakdown)

Below is every supported section/field and what it does.

## `transport`
- `pipeName`
  - Named pipe endpoint used by the app to receive frames from DOF (`VirtualLEDStripController`).
- `controlPipeName`
  - Named pipe endpoint used by Popper/runtime control commands to show/hide the matrix app.

## `matrix`
- `renderer`
  - `gpu` or `cpu` backend.
- `width`
  - Matrix width in LEDs.
- `height`
  - Matrix height in LEDs.
- `mapping`
  - LED index mapping mode (e.g., `TopDownAlternateRightLeft`).
- `dotShape`
  - `circle` or `square`.
- `minDotSpacing`
  - Minimum spacing between rendered dots.
- `brightness`
  - Global brightness multiplier.
- `gamma`
  - Gamma adjustment.

### `matrix.toneMapping`
- `enabled`
  - Enables tone mapping.
- `kneeStart`
  - Compression start point for highlights.
- `strength`
  - Tone mapping strength.

### `matrix.temporalSmoothing`
- `enabled`
  - Enables frame-to-frame smoothing.
- `riseAlpha`
  - Response speed when brightness rises.
- `fallAlpha`
  - Response speed when brightness falls.

### `matrix.visual`
- `flatShading`
  - Uses flatter/faster single-pass look when enabled.
- `fullBrightnessRadiusMinPct`
  - Percentage of dot radius kept at full brightness before falloff.
- `offStateTintR`, `offStateTintG`, `offStateTintB`
  - RGB tint values for unlit dot appearance.
- `offStateAlpha`
  - Opacity of unlit dots.
- `lensFalloff`
  - Lens falloff intensity.
- `specularHotspot`
  - Specular highlight amount.
- `rimHighlight`
  - Rim-light intensity.

### `matrix.bloom`
- `enabled`
  - Enables bloom post-effect.
- `threshold`
  - Peak-channel brightness threshold that triggers bloom (helps saturated colors bloom consistently).
- `softKnee`
  - Soft transition range above threshold so bloom fades in smoothly.
- `downsampleDivisor`
  - Downscale factor used for bloom buffers.
- `nearRadiusPx`
  - Near-field spill radius in rendered pixels.
- `farRadiusPx`
  - Far halo spill radius in rendered pixels.
- `nearStrength`
  - Intensity for near-field glow (0.0+; values above 1.0 are allowed).
- `farStrength`
  - Intensity for wide halo (0.0+; values above 1.0 are allowed).

## `window`
- `alwaysOnTop`
  - Window topmost behavior.
- `borderless`
  - Borderless window mode.
- `left`
  - Saved X position.
- `top`
  - Saved Y position.
- `width`
  - Saved window width.
- `height`
  - Saved window height.

## `debug`
- `showDebug`
  - Extra debug UI/log behavior (if implemented).
- `logProtocol`
  - Protocol logging on/off.
- `logFrames`
  - Frame-level logging on/off.

## `settings`
- `cabinetXmlPath`
  - Path to `Cabinet.xml` used by settings actions.
- `cabinetToyName`
  - LedStrip toy name to update (e.g., `Matrix1`).
- `autoUpdateCabinetOnResolutionChange`
  - Auto-write dimensions to cabinet config on apply.
- `visualQuality`
  - `Low`, `High`, or `Custom` quality profile selection.

## 11) Troubleshooting

### Matrix app opens but no animation appears
- Confirm virtual matrix app was started **before** VPX/front-end.
- Confirm replacement DLLs were copied to both x64 and x86 folders.
- Confirm table/config actually drives the configured matrix toy.

### Works in VPX but not in Popper (or vice versa)
- Re-check both DLL replacements:
  - `C:\DirectOutput\x64\DirectOutput.dll`
  - `C:\DirectOutput\x86\DirectOutput.dll`

### Existing DOF config got complicated
- Stop and contact me for a safe merge into your current `Cabinet.xml` and ini config.

## 13) Toy INI configuration

You can keep toy routing/visual settings in `toys.ini` (configured by `routing.toyConfigIniPath` in `settings.json`).

- Use short comments in the INI to explain each setting.
- See `examples/toys.sample.ini` for examples covering policy, per-toy window settings, render settings, bloom settings, and output targets.

## 14) Named-pipe broadcast adapter

The app now hosts a multi-client broadcast pipe for routed toy frames.

- Pipe name comes from `transport.broadcastPipeName` (default: `VirtualDofMatrix.Broadcast`).
- Queue bound per client comes from `transport.broadcastMaxQueuePerClient` (latest-wins eviction).
- Handshake is JSON line-based and supports protocol version, min supported version, feature flags, and optional toy filters.
