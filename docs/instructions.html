<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Virtual DOF Matrix Tester Instructions</title>
  <style>
    :root {
      --bg: #f6f8fa;
      --panel: #ffffff;
      --text: #1f2328;
      --muted: #57606a;
      --border: #d0d7de;
      --accent: #0969da;
      --code-bg: #f6f8fa;
    }

    * { box-sizing: border-box; }

    body {
      margin: 0;
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Helvetica, Arial, sans-serif;
      background: var(--bg);
      color: var(--text);
      line-height: 1.6;
    }

    .shell {
      max-width: 1000px;
      margin: 24px auto;
      padding: 0 16px;
    }

    .page {
      background: var(--panel);
      border: 1px solid var(--border);
      border-radius: 8px;
      padding: 24px;
      box-shadow: 0 1px 2px rgba(31, 35, 40, 0.06);
    }

    .header {
      margin-bottom: 16px;
      border-bottom: 1px solid var(--border);
      padding-bottom: 12px;
    }

    .header h1 {
      margin: 0 0 4px;
      font-size: 1.8rem;
    }

    .header p {
      margin: 0;
      color: var(--muted);
      font-size: 0.95rem;
    }

    #status {
      margin: 0 0 12px;
      color: var(--muted);
      font-size: 0.95rem;
    }

    #content h1, #content h2, #content h3, #content h4 {
      line-height: 1.25;
      margin-top: 1.2em;
      margin-bottom: 0.5em;
    }

    #content h1,
    #content h2 {
      border-bottom: 1px solid var(--border);
      padding-bottom: 0.25em;
    }

    #content p, #content ul, #content ol, #content blockquote {
      margin-top: 0;
      margin-bottom: 1em;
    }

    #content code {
      background: var(--code-bg);
      border: 1px solid var(--border);
      border-radius: 4px;
      padding: 0.1em 0.35em;
      font-family: ui-monospace, SFMono-Regular, Menlo, Monaco, Consolas, "Liberation Mono", "Courier New", monospace;
      font-size: 0.92em;
    }

    #content pre {
      background: var(--code-bg);
      border: 1px solid var(--border);
      border-radius: 6px;
      padding: 12px;
      overflow-x: auto;
    }

    #content a {
      color: var(--accent);
    }

    #content blockquote {
      color: var(--muted);
      border-left: 4px solid var(--border);
      padding-left: 12px;
    }

    .footer {
      margin-top: 24px;
      color: var(--muted);
      font-size: 0.9rem;
    }
  </style>
</head>
<body>
  <div class="shell">
    <main class="page">
      <header class="header">
        <h1>Virtual DOF Matrix Tester Instructions</h1>
        <p>HTML wrapper that renders <code>instructions_content.md</code> directly.</p>
      </header>

      <p id="status">Loading <code>instructions_content.md</code>...</p>
      <article id="content"></article>

      <noscript>
        JavaScript is required to render markdown. Open <code>docs/instructions_content.md</code> directly.
      </noscript>

      <p class="footer">Last updated: 2026-04-01</p>
    </main>
  </div>

  <script src="https://cdn.jsdelivr.net/npm/marked/marked.min.js"></script>
  <script>
    (async function renderMarkdown() {
      const status = document.getElementById('status');
      const content = document.getElementById('content');

      try {
        const response = await fetch('instructions_content.md', { cache: 'no-store' });
        if (!response.ok) {
          throw new Error(`Unable to load markdown (${response.status})`);
        }

        const markdown = await response.text();

        if (window.marked) {
          content.innerHTML = window.marked.parse(markdown);
          status.textContent = 'Showing content from instructions_content.md';
          return;
        }

        content.textContent = markdown;
        status.textContent = 'Markdown parser unavailable. Showing raw markdown text.';
      } catch (error) {
        status.textContent = `Failed to load instructions_content.md: ${error.message}`;
      }
    })();
  </script>
</body>
</html>
