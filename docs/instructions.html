  <script id="md-source" type="text/plain"># Virtual DOF Matrix End-User Setup Guide

This guide is written for everyday cabinet owners, including first-time DOF users.

---

## What this app does

Virtual DOF Matrix displays DOF LED output in one or more virtual on-screen windows (for example: backglass matrix, topper, or flashers).

---

## Before you start

You need:

- Windows
- This Virtual DOF Matrix package ZIP
- Visual Pinball X (VPX) if you want to launch tables
- A front-end (like PinUP Popper) only if you use a front-end workflow (optional)

DOF is **not** a prerequisite for this section; Step 1 includes the DOF installation path.

---

## First-time app setup (no DOF installed yet)

If you are setting up this app for the first time and do not already have DOF installed, watch this walkthrough before Step 1:

- https://youtu.be/lIG6JJ05xbw

---

## 1) Install DOF first, then replace DLLs from this package

This order matters.

### Step 1A - Install DOF from mjrnet

If DOF is not installed yet, install it first from:

- http://mjrnet.org/pinscape/dll-updates.html#DOF

Install both runtimes into `C:\DirectOutput`:

- 64-bit runtime (used by VPX): `C:\DirectOutput\x64\DirectOutput.dll`
- 32-bit runtime (used by Popper/front-end paths): `C:\DirectOutput\x86\DirectOutput.dll`

### Step 1B - Replace both DOF DLLs with the ones in this ZIP

After DOF is installed from mjrnet:

1. Back up existing DLLs:
   - `C:\DirectOutput\x64\DirectOutput.dll`
   - `C:\DirectOutput\x86\DirectOutput.dll`
2. Copy the package DLLs into those same folders:
   - package x64 DLL -> `C:\DirectOutput\x64\DirectOutput.dll`
   - package x86 DLL -> `C:\DirectOutput\x86\DirectOutput.dll`

### Step 1C - Copy the package config files

Why this step exists:

- The downloadable ZIP includes a `DOF/Config` folder with prebuilt configuration files used by this app.
- DOF reads configuration from your local `{DOFInstallDir}\Config` folder (for example `C:\DirectOutput\Config`).
- Copying these files gives DOF the matching cabinet/toy setup needed to drive the virtual matrix correctly.

What to do:

1. Open the ZIP contents and go to `DOF/Config`.
2. Copy everything in that folder.
3. Paste into your DOF config folder: `{DOFInstallDir}\Config` (example: `C:\DirectOutput\Config`).

If Windows asks to replace files:

- New users/no existing custom DOF config: replace as needed.
- Existing custom DOF config: merge carefully instead of blind overwrite.

---

## 2) Configure Cabinet.xml (beginner walkthrough)

If all you want is the default single virtual LED matrix from the provided package config, you can skip Step 2.

Use Step 2 when you need to review or customize Cabinet.xml entries.

### Step 2A - Open Cabinet.xml

1. Go to `C:\DirectOutput\Config`.
2. Open `Cabinet.xml` in a text editor (Notepad++ recommended).

### Step 2B - Find your virtual matrix controller entry

Use search (`Ctrl+F`) for:

- `VirtualLEDStripController`

If you have the sample config from this repo/package applied, you should already have this controller type in your file.

### Step 2C - Confirm the pipe/controller name matches app settings

In `Cabinet.xml`, find the controller's pipe name value. In `settings.json`, find:

```json
"transport": {
  "pipeName": "VirtualDofMatrix"
}
```

These two names must match exactly (same spelling, same capitalization).

Tip: the provided examples use `VirtualDofMatrix`.

### Step 2D - Confirm matrix toy name and dimensions

In the same `Cabinet.xml`, find the LED toy used for your matrix (commonly `Matrix1` in this project setup).

Confirm it matches your intended matrix size and arrangement from your config examples.

If your app/window resolution settings are changed later, keep Cabinet.xml matrix dimensions in sync.

When **Auto-update Cabinet on resolution change** is enabled in app settings, the app now does a safe 2-step write:

1. Shows a dry-run summary of the exact virtual-toy changes it plans to make.
2. Writes `Cabinet.xml` only after you click **Yes** in that confirmation prompt.

This applies when either:

- matrix resolution changed, or
- enabled toy routing geometry (toy name/id + width/height) changed in Settings.

What gets changed:

- Managed virtual LED toy fields for that target toy (for example width/height/controller link).
- New managed toys without an explicit first LED are assigned the next unused LED index on that controller.
- If a new toy requests a first LED that overlaps an existing managed range, it is automatically moved to the next free slot.
- Matching `LedWizEquivalent` output names/numbers for managed virtual toys (so renamed/new toys stay aligned).
- Virtual controller `NumberOfLedsStrip1` is recalculated from managed toy first LED + size ranges.
- If a toy's bulb count is reduced, its managed LED count is reduced too, and controller totals are recalculated downward.

What stays untouched:

- Non-managed/hardware toys and unrelated sections of `Cabinet.xml`.

---

## 3) First launch order

Always start in this order:

1. Launch `VirtualDofMatrix.App.exe`
2. Launch Popper/VPX table

If VPX/DOF starts first, the matrix app might miss the initial connection.

---

## 4) Settings split: settings.json vs toys.ini

- `settings.json` = global app settings (transport, defaults, debug, etc.)
- `toys.ini` = toy-specific settings (toy definitions, source ranges, per-toy window settings, routing)

Toy definitions should be managed in `toys.ini`.

---

## 5) Add a second / third / fourth virtual toy (toys.ini)

All additional virtual outputs are configured in `toys.ini`.

### Virtual Toys tab quick note (enable/disable + save)

In **Settings -> Virtual Toys**:

- Each toy row has an on/off switch on the left.
- Toy rows may show both cabinet toy name and routing toy ID in parentheses.
- Turning a toy off disables it and hides its viewer window.
- At least one toy must stay enabled; if only one remains enabled, its switch is temporarily locked.
- If you changed any toy switches, use **Save Global** to apply those toy-state changes to global config.
- If you change toy width/height and save, the viewer windows rebuild immediately (no app restart required).
- Display tab now focuses on global renderer/quality options; toy-specific dot/geometry controls live under Virtual Toys.
- If a table/ROM is currently active, a second button appears so you can save using that scoped label.
- You can open **Settings** from any virtual viewer window (not only the main matrix window).
- **Exit** from any viewer window closes the full app.
- Settings is modeless, so you can keep it open while dragging/resizing toy windows.
- Clicking a toy row in Settings brings that toy window to the front for quick repositioning.
- While Settings is open, each toy window shows its toy name overlay in white.
- The selected toy window shows a bright inner border.

### Step A - Open toys.ini

- Path is set by `routing.toyConfigIniPath` in `settings.json`.
- Default is `toys.ini` next to `settings.json`.
- If missing, run the app once and it can create a starter file.

### Step B - Duplicate an existing toy section

Each toy is a section such as:

```ini
[toy:backglass-main]
```

Copy/paste a section and rename it, for example:

```ini
[toy:topper-2]
[toy:flasher-left]
[toy:flasher-right]
```

### Step C - Choose the toy type (`kind`)

Use one of:

- `matrix`
- `topper`
- `flasher`

### Step D - Enable the toy

Set:

```ini
enabled = true
```

Example: to turn on a toy you added:

```ini
[toy:flasher-left]
enabled = true
```

### Step E - Set geometry + mapping

For each toy, set:

- `width`
- `height`
- `mapping` (`TopDownAlternateRightLeft`, `RowMajor`, or `ColumnMajor`)

### Step F - Set the source LED range

For each toy, set:

- `sourceCanonicalStart`
- `sourceLength`

Keep ranges non-overlapping unless you intentionally want duplicate/mirrored output.

### Step G - Set output targets

Typical values:

- `viewer`
- `pipe-broadcast`
- both: `viewer,pipe-broadcast`

### Step H - Place each toy window

Per toy window fields include:

- `windowLeft`, `windowTop`
- `windowWidth`, `windowHeight`
- `windowAlwaysOnTop`, `windowBorderless`, `windowLockAspectRatio`
- `windowBackgroundVisible`, `windowBackgroundColor` (Toy Wizard now offers a preset color dropdown with swatches; set visible to `false` for transparent/invisible strip backdrops)

Strip defaults in the Toy Wizard:

- `windowLockAspectRatio` defaults to `false`
- `windowBackgroundVisible` defaults to `false`
- default strip window size is derived from bulb size + spacing (bulb size comes from `settings.defaultStripBulbSize`, default `32`):
  - horizontal: `(bulbWidth + minSpacing) * bulbCount` by `bulbHeight`
  - vertical: `bulbWidth` by `(bulbHeight + minSpacing) * bulbCount`

## 6) DOF-side changes needed for extra toys

Adding a toy in `toys.ini` alone is not enough. DOF must also be configured to output those toy ranges.

You generally need to keep these aligned:

1. `Cabinet.xml` toy/controller definitions
2. DOF Config Tool assignments and effect mapping
3. Re-generated DOF config files copied back to your cabinet

## 7) Popper setup (detailed)

You can launch the app once at Popper startup, then control visibility during table lifecycle.

### Command format

```bat
"C:\vPin\VirtualLED\VirtualDofMatrix.App.exe" --command <action> [optional args]
```

Replace `C:\vPin\VirtualLED` with your real install path.

Supported actions:

- `show`
- `hide`
- `frontend-return`
- `table-launch [CUSTOM1] [CUSTOM2] [CUSTOM3] [CUSTOM4]`
- `table-launch --default-show-virtual-led [CUSTOM1] [CUSTOM2] [CUSTOM3] [CUSTOM4]`

### Recommended Popper flow

1. **Popper Startup Script**

   ```bat
   START "" "C:\vPin\VirtualLED\VirtualDofMatrix.App.exe"
   ```

2. **Table launch style (choose one)**

   **Choice A: Hide by default, show only selected tables**

   ```bat
   "C:\vPin\VirtualLED\VirtualDofMatrix.App.exe" --command table-launch "[CUSTOM1]" "[CUSTOM2]" "[CUSTOM3]" "[CUSTOM4]"
   ```

   - If no custom var contains `ShowVirtualLED`, matrix stays hidden during table.
   - Put `ShowVirtualLED` in any custom var to keep it visible.
   - `HideVirtualLED` still forces hidden.

   **Choice B: Show by default, hide selected tables**

   ```bat
   "C:\vPin\VirtualLED\VirtualDofMatrix.App.exe" --command table-launch --default-show-virtual-led "[CUSTOM1]" "[CUSTOM2]" "[CUSTOM3]" "[CUSTOM4]"
   ```

   - Matrix stays visible unless a custom var contains `HideVirtualLED`.

3. **VPX Close Script** (when returning to Popper)

   ```bat
   "C:\vPin\VirtualLED\VirtualDofMatrix.App.exe" --command frontend-return
   ```

4. **Popper Exit Script**

   ```bat
   taskkill /IM "VirtualDofMatrix.App.exe" /F
   ```

### Optional explicit override

```bat
"C:\vPin\VirtualLED\VirtualDofMatrix.App.exe" --command hide
"C:\vPin\VirtualLED\VirtualDofMatrix.App.exe" --command show
```

---

## 8) Troubleshooting

### App opens but no animation

- Start app first, then VPX/front-end.
- Confirm both DOF DLLs (x64 and x86) were replaced from this package.
- Confirm controller name/pipe value matches between `Cabinet.xml` and `settings.json`.

### Main toy works, added toys stay dark

- Confirm each added toy has `enabled = true`.
- Confirm `sourceCanonicalStart` and `sourceLength` are correct.
- Confirm DOF is actually outputting those extra toy ranges.

### Works in VPX but not Popper (or reverse)

- Re-check both DLL locations:
  - `C:\DirectOutput\x64\DirectOutput.dll`
  - `C:\DirectOutput\x86\DirectOutput.dll`
