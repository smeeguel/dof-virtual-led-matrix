  <script id="md-source" type="text/plain"># Virtual DOF Matrix End-User Setup Guide

This guide is for everyday pinball cabinet users who want to run the Virtual DOF Matrix viewer.

It is written for beginner-level DOF users and focuses on practical setup steps.

---

## What this app does

The Virtual DOF Matrix app creates one or more virtual LED windows on your screen.

Those windows receive output from DOF and display effects such as score-style matrix data, toppers, and flashers (depending on your DOF configuration).

---

## Before you start

You need:

- Windows
- A working DOF install (`C:\DirectOutput`)
- VPX/PinUP (or your front-end)
- This Virtual DOF Matrix package

If DOF is not installed yet, install both DOF runtimes first:

- `C:\DirectOutput\x64\DirectOutput.dll`
- `C:\DirectOutput\x86\DirectOutput.dll`

Reference download page:

- http://mjrnet.org/pinscape/dll-updates.html#DOF

---

## 1) Install the package files

1. Unzip the package to any folder (example: `C:\vPin\VirtualLED`).
2. Back up your current DOF DLLs in both folders:
   - `C:\DirectOutput\x64`
   - `C:\DirectOutput\x86`
3. Copy the package DLLs into those same folders, replacing existing files.
4. Copy or merge the provided config files into your DOF config location (`C:\DirectOutput\Config`).

If you already have a customized cabinet, merge carefully instead of overwriting everything.

---

## 2) Configure Cabinet.xml for the virtual controller

For the named-pipe build in this repo, your `Cabinet.xml` should use `VirtualLEDStripController`.

Required concept:

- Controller type: `VirtualLEDStripController`
- Pipe name in `Cabinet.xml` must match `transport.pipeName` in `settings.json`

Example pipe value used by default:

- `VirtualDofMatrix`

If these names do not match exactly, the app will not receive frames.

---

## 3) First launch order

Always use this order:

1. Start `VirtualDofMatrix.App.exe`
2. Start your front-end or VPX table

If DOF starts first, the initial connection can fail.

---

## 4) Basic settings (non-toy)

`settings.json` holds global app settings (transport, default matrix behavior, window defaults, debug flags).

Important:

- Per-toy configuration is now in `toys.ini`.
- Do not put toy definitions in `settings.json`.

---

## 5) Add a second / third / fourth virtual toy (toys.ini)

All additional virtual outputs are defined in `toys.ini`.

### Step A - Open toys.ini

- Path comes from `routing.toyConfigIniPath` in `settings.json`.
- Default filename is `toys.ini` next to `settings.json`.
- If missing, the app can generate a starter file.

### Step B - Duplicate an existing toy block

Each toy is an INI section like:

```ini
[toy:backglass-main]
```

To create another toy, copy a section and rename it, for example:

```ini
[toy:topper-2]
[toy:flasher-left]
[toy:flasher-right]
```

### Step C - Choose toy type (`kind`)

Common values:

- `matrix`
- `topper`
- `flasher`

You can also use a custom label, but the three values above are the expected built-in patterns right now.

### Step D - Enable the toy

Set:

```ini
enabled = true
```

Example requested: to enable the provided 5-bulb flasher sample, open `[toy:flasher-5bulb]` and change:

```ini
enabled = true
```

### Step E - Set size and mapping

For each toy:

- `width`
- `height`
- `mapping` (`TopDownAlternateRightLeft`, `RowMajor`, or `ColumnMajor`)

### Step F - Set source range

Each toy must read a unique LED range from the canonical stream:

- `sourceCanonicalStart`
- `sourceLength`

Avoid overlap unless you intentionally want mirrored output.

### Step G - Set output targets

Typical values:

- `viewer`
- `pipe-broadcast`
- or both: `viewer,pipe-broadcast`

### Step H - Position each toy window

Set per toy as needed:

- `windowLeft`
- `windowTop`
- `windowWidth`
- `windowHeight`
- `windowAlwaysOnTop`
- `windowBorderless`
- `windowLockAspectRatio`

---

## 6) Example: turn on second/third/fourth toys

A practical pattern:

1. Keep `[toy:backglass-main]` enabled.
2. Enable `[toy:topper-main]` for a second display surface.
3. Enable `[toy:flasher-5bulb]` for a third display surface.
4. Add a new copied section (for example `[toy:flasher-right]`) as a fourth surface.
5. Assign non-overlapping `sourceCanonicalStart` + `sourceLength` values.
6. Save `toys.ini`, restart app, then launch a table.

---

## 7) What must change in DOF for extra toys

Adding toy sections in `toys.ini` alone is not enough. DOF must also send data for those outputs.

You usually need all of the following aligned:

1. `Cabinet.xml` toy/controller definitions
2. DOF config tool assignments (ports, devices, toy mapping, and effect routing)
3. Generated DOF config files re-exported and copied back to cabinet

---

## 8) Troubleshooting

### App opens but nothing animates

- Confirm app started before VPX/front-end.
- Confirm `Cabinet.xml` pipe name matches `settings.json` pipe name.
- Confirm both x64 and x86 DOF DLLs were replaced.

### One toy works but others stay black

- Confirm each added toy has `enabled = true`.
- Confirm each toy has correct `sourceCanonicalStart` / `sourceLength`.
- Confirm DOF is actually outputting data for those additional toy ranges.

### Works in VPX but not front-end (or reverse)

- Re-check both bitness DLL installs (`x64` and `x86`).

---

## 9) Optional Popper control commands

Example command format:

```bat
"C:\vPin\VirtualLED\VirtualDofMatrix.App.exe" --command <action>
```

Common actions:

- `show`
- `hide`
- `frontend-return`
- `table-launch` (with optional custom variables)

If you use a startup script, launch the app once at startup and then use `--command` calls to show/hide as tables open and close.

---

## 10) Final checklist

- [ ] App starts without errors.
- [ ] Main virtual matrix receives animation.
- [ ] Added toys (second/third/fourth) show expected output.
- [ ] Pipe names match between `Cabinet.xml` and `settings.json`.
- [ ] Extra toys are enabled in `toys.ini`.
- [ ] DOF config changes were regenerated and deployed.
