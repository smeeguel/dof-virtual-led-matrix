; Virtual DOF Matrix toy routing INI
; Keep comments short. Copy this file to toys.ini next to settings.json.

[policy]
; Missing data policy: drop | partial-black-fill | hold-last
onMissingData = partial-black-fill
; Oversize source range policy: reject-config | clamp
onOversizeRange = clamp
; Burst/frame spike policy: latest-wins | drop-oldest
onFrameRateSpike = latest-wins
; Default strip length used when strip+offset is provided
; Example: 1100
defaultStripLength = 1100

[toy:backglass-main]
; Enable/disable this toy
enabled = true
; Kind is free-form (matrix/topper/etc.)
kind = matrix
; Matrix dimensions
width = 32
height = 8
; Mapping mode
mapping = TopDownAlternateRightLeft

; Canonical source range (LED index + length)
sourceCanonicalStart = 0
sourceLength = 256
; Optional source strip coordinates
sourceStripIndex = 0
sourceStripOffset = 0

; Window placement and behavior
windowLeft = 10
windowTop = 6
windowWidth = 1412
windowHeight = 353
windowAlwaysOnTop = true
windowBorderless = true

; Render options
renderDotShape = circle
renderMinDotSpacing = 2
renderBrightness = 1.0
renderGamma = 0.8

; Per-toy bloom options
bloomEnabled = true
bloomThreshold = 0.72
bloomSoftKnee = 0.18
bloomNearRadiusPx = 2
bloomFarRadiusPx = 10
bloomNearStrength = 1.0
bloomFarStrength = 0.2

; Comma-separated adapter names
; Example: viewer,pipe
outputTargets = viewer

[toy:topper-main]
; Example secondary toy with its own window
enabled = false
kind = topper
width = 64
height = 8
mapping = RowMajor
sourceCanonicalStart = 256
sourceLength = 512
windowLeft = 40
windowTop = 420
windowWidth = 1280
windowHeight = 180
outputTargets = viewer
