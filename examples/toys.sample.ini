; Virtual DOF Matrix toy routing INI
; Keep comments short. Copy this file to toys.ini next to settings.json.

[policy]
; onMissingData options: drop | partial-black-fill | hold-last
onMissingData = partial-black-fill
; onOversizeRange options: reject-config | clamp
onOversizeRange = clamp
; onFrameRateSpike options: latest-wins | drop-oldest
onFrameRateSpike = latest-wins
; defaultStripLength options: positive integer (example: 1100)
defaultStripLength = 1100

[toy:backglass-main]
; enabled options: true | false
enabled = true
; kind options: matrix | topper | <custom-name>
kind = matrix
; width options: positive integer (legacy default: 128)
width = 128
; height options: positive integer (legacy default: 32)
height = 32
; mapping options: TopDownAlternateRightLeft | RowMajor | ColumnMajor
mapping = TopDownAlternateRightLeft

; sourceCanonicalStart options: integer >= 0
sourceCanonicalStart = 0
; sourceLength options: integer > 0 (legacy default 128*32 = 4096)
sourceLength = 4096
; sourceStripIndex options: integer >= 0 (optional)
sourceStripIndex = 0
; sourceStripOffset options: integer >= 0 (optional)
sourceStripOffset = 0

; windowLeft options: number (pixels)
windowLeft = 10
; windowTop options: number (pixels)
windowTop = 6
; windowWidth options: number > 0 (pixels)
windowWidth = 1412
; windowHeight options: number > 0 (pixels)
windowHeight = 353
; windowAlwaysOnTop options: true | false
windowAlwaysOnTop = true
; windowBorderless options: true | false
windowBorderless = true

; renderDotShape options: circle | square
renderDotShape = circle
; renderMinDotSpacing options: integer >= 0
renderMinDotSpacing = 2
; fillGapEnabled options: true | false (true stretches dots to fill viewport space minus spacing)
fillGapEnabled = false
; renderBrightness options: number 0.0..1.0 (example: 1.0)
renderBrightness = 1.0
; renderGamma options: number > 0 (example: 0.8)
renderGamma = 0.8

; bloomEnabled options: true | false
bloomEnabled = true
; bloomThreshold options: number 0.0..1.0
bloomThreshold = 0.72
; bloomSoftKnee options: number 0.0..1.0
bloomSoftKnee = 0.18
; bloomNearRadiusPx options: integer >= 0
bloomNearRadiusPx = 2
; bloomFarRadiusPx options: integer >= 0
bloomFarRadiusPx = 10
; bloomNearStrength options: number >= 0
bloomNearStrength = 1.0
; bloomFarStrength options: number >= 0
bloomFarStrength = 0.2

; outputTargets options: comma list of adapter names (example: viewer,pipe-broadcast)
outputTargets = viewer,pipe-broadcast

[toy:topper-main]
; enabled options: true | false
enabled = false
; kind options: matrix | topper | <custom-name>
kind = topper
; width options: positive integer
width = 64
; height options: positive integer
height = 8
; mapping options: TopDownAlternateRightLeft | RowMajor | ColumnMajor
mapping = RowMajor
; sourceCanonicalStart options: integer >= 0
sourceCanonicalStart = 256
; sourceLength options: integer > 0
sourceLength = 512
; windowLeft options: number (pixels)
windowLeft = 40
; windowTop options: number (pixels)
windowTop = 420
; windowWidth options: number > 0 (pixels)
windowWidth = 1280
; windowHeight options: number > 0 (pixels)
windowHeight = 180
; outputTargets options: comma list of adapter names
outputTargets = viewer


[toy:flasher-5bulb]
; 5-bulb flasher proof-of-concept toy (common DOF style)
; enabled options: true | false
enabled = false
; kind options: matrix | topper | flasher | <custom-name>
kind = flasher
; width options: positive integer
width = 5
; height options: positive integer
height = 1
; mapping options: TopDownAlternateRightLeft | RowMajor | ColumnMajor
mapping = RowMajor
; sourceCanonicalStart options: integer >= 0 (use 0 for quick proof-of-concept visibility)
sourceCanonicalStart = 0
; sourceLength options: integer > 0
sourceLength = 5
; windowLeft/windowTop options: number (pixels)
windowLeft = 40
windowTop = 420
; windowWidth/windowHeight options: number > 0 (pixels)
windowWidth = 300
windowHeight = 80
; outputTargets options: comma list of adapter names
outputTargets = viewer,pipe-broadcast
