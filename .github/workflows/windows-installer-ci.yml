name: Windows Installer CI

on:
  pull_request:
  push:
    branches:
      - main

jobs:
  installer-ci:
    name: Build installer and run integration checks
    runs-on: windows-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v5

      - name: Setup .NET
        uses: actions/setup-dotnet@v5
        with:
          dotnet-version: 8.0.x

      - name: Build app publish output
        shell: pwsh
        run: |
          dotnet restore VirtualDofMatrix.sln
          dotnet publish src/VirtualDofMatrix.App/VirtualDofMatrix.App.csproj `
            -c Release `
            -r win-x64 `
            --self-contained true `
            /p:PublishSingleFile=true `
            /p:EnableCompressionInSingleFile=true `
            /p:IncludeNativeLibrariesForSelfExtract=true `
            /p:PublishTrimmed=false `
            /p:DebugType=None `
            /p:DebugSymbols=false

      - name: Build installer
        id: build_installer
        shell: pwsh
        run: |
          $ErrorActionPreference = 'Stop'
          $publishDir = (Resolve-Path 'src/VirtualDofMatrix.App/bin/Release/net8.0-windows/win-x64/publish').Path

          dotnet publish installer/VirtualDofMatrix.Installer/VirtualDofMatrix.Installer.csproj `
            -c Release `
            -r win-x64 `
            --self-contained true `
            /p:PublishSingleFile=true `
            /p:EnableCompressionInSingleFile=true `
            /p:IncludeNativeLibrariesForSelfExtract=true `
            /p:PublishTrimmed=false `
            /p:DebugType=None `
            /p:DebugSymbols=false `
            /p:Version=0.1.0 `
            /p:InstallerAppPublishDir="$publishDir\\"

          $installerPath = 'installer/VirtualDofMatrix.Installer/bin/x64/Release/net8.0-windows/win-x64/publish/VirtualDofMatrix.Installer.exe'

          if ([string]::IsNullOrWhiteSpace($installerPath) -or -not (Test-Path -LiteralPath $installerPath -PathType Leaf)) {
            throw 'Installer exe not found after publish.'
          }

          "installer_path=$installerPath" | Out-File -FilePath $env:GITHUB_OUTPUT -Encoding utf8 -Append

      - name: Run installer integration checks
        shell: pwsh
        run: |
          ./tools/ci/run-installer-integration-checks.ps1 -InstallerPath "${{ steps.build_installer.outputs.installer_path }}"

      - name: Upload installer logs on failure
        if: failure()
        uses: actions/upload-artifact@v6
        with:
          name: installer-verbose-logs
          path: artifacts/ci-logs/**/*.log
          if-no-files-found: warn
