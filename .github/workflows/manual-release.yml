name: Manual Release

on:
  workflow_dispatch:
    inputs:
      release_kind:
        description: "Release type (stable bumps app version, test keeps app version and appends test build suffix)"
        required: true
        default: test
        type: choice
        options:
          - test
          - stable
      bump:
        description: "Version bump when release_kind=stable and version_override is empty"
        required: true
        default: patch
        type: choice
        options:
          - patch
          - minor
          - major
      version_override:
        description: "Optional app version in N.N.N format (e.g. 0.2.0)"
        required: false
        type: string
      test_build_suffix:
        description: "Optional test build suffix used when release_kind=test (e.g. qa.3)"
        required: false
        type: string

permissions:
  contents: write

jobs:
  release:
    name: Build and publish release
    runs-on: windows-latest
    if: github.ref_name == 'main'

    steps:
      - name: Validate workflow branch
        if: github.ref_name != 'main'
        run: |
          Write-Error "This workflow only runs from main. Current ref: $env:GITHUB_REF_NAME"

      - name: Checkout
        uses: actions/checkout@v5
        with:
          fetch-depth: 0

      - name: Setup .NET
        uses: actions/setup-dotnet@v5
        with:
          dotnet-version: 8.0.x

      - name: Validate release manifest sources
        shell: pwsh
        run: |
          $ErrorActionPreference = 'Stop'

          $manifestPath = "release-manifest.json"
          if (-not (Test-Path -LiteralPath $manifestPath -PathType Leaf)) {
            throw "Manifest file not found: $manifestPath"
          }

          $manifest = Get-Content -LiteralPath $manifestPath -Raw | ConvertFrom-Json
          if ($null -eq $manifest.mappings -or $manifest.mappings.Count -eq 0) {
            throw "Manifest contains no mappings: $manifestPath"
          }

          Write-Host "Validating $($manifest.mappings.Count) manifest mappings..."
          for ($i = 0; $i -lt $manifest.mappings.Count; $i++) {
            $mapping = $manifest.mappings[$i]
            if ([string]::IsNullOrWhiteSpace($mapping.type)) {
              throw "Mapping[$i] missing 'type'."
            }
            if ([string]::IsNullOrWhiteSpace($mapping.from)) {
              throw "Mapping[$i] missing 'from'."
            }
            if ([string]::IsNullOrWhiteSpace($mapping.to)) {
              throw "Mapping[$i] missing 'to'."
            }

            $sourcePath = [System.IO.Path]::GetFullPath($mapping.from)
            switch ($mapping.type.ToLowerInvariant()) {
              "file" {
                if (-not (Test-Path -LiteralPath $sourcePath -PathType Leaf)) {
                  throw "Mapping[$i] file source not found: '$($mapping.from)'"
                }
              }
              "directory" {
                if (-not (Test-Path -LiteralPath $sourcePath -PathType Container)) {
                  throw "Mapping[$i] directory source not found: '$($mapping.from)'"
                }
              }
              "glob" {
                if ([string]::IsNullOrWhiteSpace($mapping.from)) {
                  throw "Mapping[$i] glob pattern is empty."
                }
              }
              default {
                throw "Mapping[$i] has unsupported type '$($mapping.type)'."
              }
            }

            Write-Host "Mapping[$i] OK: [$($mapping.type)] $($mapping.from) -> $($mapping.to)"
          }

      - name: Resolve release version
        id: version
        shell: pwsh
        env:
          INPUT_RELEASE_KIND: ${{ inputs.release_kind }}
          INPUT_BUMP: ${{ inputs.bump }}
          INPUT_VERSION_OVERRIDE: ${{ inputs.version_override }}
          INPUT_TEST_BUILD_SUFFIX: ${{ inputs.test_build_suffix }}
          GITHUB_RUN_NUMBER: ${{ github.run_number }}
          GITHUB_RUN_ATTEMPT: ${{ github.run_attempt }}
        run: |
          $ErrorActionPreference = 'Stop'
          $ProgressPreference = 'SilentlyContinue'

          try {
            git fetch --tags --force

            function Get-NextVersionCandidate([Version]$version, [string]$bumpKind) {
              switch ($bumpKind) {
                'major' { return "{0}.{1}.{2}" -f ($version.Major + 1), 0, 0 }
                'minor' { return "{0}.{1}.{2}" -f $version.Major, ($version.Minor + 1), 0 }
                'patch' { return "{0}.{1}.{2}" -f $version.Major, $version.Minor, ($version.Build + 1) }
                default { throw "Unsupported bump value '$bumpKind'." }
              }
            }

            function Test-TagExists([string]$tagName) {
              $exactMatch = git tag --list $tagName | Select-Object -First 1
              return -not [string]::IsNullOrWhiteSpace($exactMatch)
            }

            function Get-LatestStableVersion() {
              $latestStableTag = git tag --list 'v*' --sort=-v:refname | Where-Object { $_ -match '^v\d+\.\d+\.\d+$' } | Select-Object -First 1
              if (-not $latestStableTag) {
                return [Version]'0.0.0'
              }

              return [Version]($latestStableTag.Substring(1))
            }

            function Get-NormalizedBuildSuffix([string]$suffix) {
              if ([string]::IsNullOrWhiteSpace($suffix)) {
                return "build.$env:GITHUB_RUN_NUMBER.$env:GITHUB_RUN_ATTEMPT"
              }

              $normalized = $suffix.Trim().ToLowerInvariant()
              if ($normalized -notmatch '^[0-9a-z]+([.-][0-9a-z]+)*$') {
                throw "test_build_suffix must use only [0-9a-z.-] segments, got '$suffix'"
              }

              return $normalized
            }

            $releaseKind = "$env:INPUT_RELEASE_KIND".Trim().ToLowerInvariant()
            $override = "$env:INPUT_VERSION_OVERRIDE".Trim()
            Write-Host "Version input: release_kind='$releaseKind' bump='$env:INPUT_BUMP' override='${override}' test_build_suffix='$env:INPUT_TEST_BUILD_SUFFIX'"

            if ($releaseKind -notin @('stable', 'test')) {
              throw "release_kind must be 'stable' or 'test', got '$releaseKind'"
            }

            if ($override -and $override -notmatch '^\d+\.\d+\.\d+$') {
              throw "version_override must match N.N.N format, got '$override'"
            }

            # Keep the Git tag, display version, and artifact label separate so internal
            # test tags can live under test/... without leaking slashes into filenames.
            $isRelease = 'false'

            # For stable releases we keep the current behavior: resolve the next unused vN.N.N tag.
            if ($releaseKind -eq 'stable') {
              if ($override) {
                $nextVersion = $override
                $gitTag = "v$nextVersion"
                if (Test-TagExists $gitTag) {
                  throw "Tag '$gitTag' already exists. Provide a new version_override."
                }
              }
              else {
                $baseVersion = Get-LatestStableVersion
                Write-Host "Latest stable version: $baseVersion"

                $candidateBase = $baseVersion
                do {
                  $nextVersion = Get-NextVersionCandidate $candidateBase "$env:INPUT_BUMP"
                  $gitTag = "v$nextVersion"
                  if (Test-TagExists $gitTag) {
                    Write-Host "Tag '$gitTag' already exists, trying next $env:INPUT_BUMP version..."
                    $candidateBase = [Version]$nextVersion
                  }
                } while (Test-TagExists $gitTag)

                Write-Host "Resolved next stable version: $nextVersion"
              }

              $displayVersion = "v$nextVersion"
              $artifactTag = $displayVersion
              $isRelease = 'true'
            }
            else {
              # For test builds we intentionally keep app version stable and only vary a pre-release suffix.
              if ($override) {
                $baseVersionText = $override
              }
              else {
                $baseVersionText = (Get-LatestStableVersion).ToString()
              }

              $buildSuffix = Get-NormalizedBuildSuffix "$env:INPUT_TEST_BUILD_SUFFIX"
              $nextVersion = $baseVersionText
              $gitTag = "test/v$baseVersionText-$buildSuffix"
              $displayVersion = "v$baseVersionText-test.$buildSuffix"
              $artifactTag = "test-v$baseVersionText-$buildSuffix"

              if (Test-TagExists $gitTag) {
                throw "Computed test tag '$gitTag' already exists. Provide a different test_build_suffix."
              }

              Write-Host "Resolved test build tag without bumping app version: $gitTag"
            }

            if (-not $gitTag) {
              $gitTag = "v$nextVersion"
            }

            if (Test-TagExists $gitTag) {
              if ($override) {
                throw "Tag '$gitTag' already exists. Provide a new version_override."
              }
              throw "Unable to resolve a unique tag for '$gitTag'."
            }

            "version=$nextVersion" | Out-File -FilePath $env:GITHUB_OUTPUT -Encoding utf8 -Append
            "git_tag=$gitTag" | Out-File -FilePath $env:GITHUB_OUTPUT -Encoding utf8 -Append
            "display_version=$displayVersion" | Out-File -FilePath $env:GITHUB_OUTPUT -Encoding utf8 -Append
            "artifact_tag=$artifactTag" | Out-File -FilePath $env:GITHUB_OUTPUT -Encoding utf8 -Append
            "is_release=$isRelease" | Out-File -FilePath $env:GITHUB_OUTPUT -Encoding utf8 -Append
            Write-Host "Resolved release outputs: version='$nextVersion' git_tag='$gitTag' display_version='$displayVersion' artifact_tag='$artifactTag' is_release='$isRelease'"
          }
          catch {
            Write-Host "::error::Release version resolution failed."
            Write-Host "::error::Message: $($_.Exception.Message)"
            Write-Host "::error::Exception type: $($_.Exception.GetType().FullName)"
            Write-Host "Recent v* tags for debugging:"
            git tag --list 'v*' --sort=-v:refname | Select-Object -First 20 | ForEach-Object { Write-Host "  $_" }
            throw
          }

      - name: Build application
        shell: pwsh
        run: |
          dotnet restore VirtualDofMatrix.sln
          dotnet publish src/VirtualDofMatrix.App/VirtualDofMatrix.App.csproj `
            -c Release `
            -r win-x64 `
            --self-contained true `
            /p:PublishSingleFile=true `
            /p:EnableCompressionInSingleFile=true `
            /p:IncludeNativeLibrariesForSelfExtract=true `
            /p:PublishTrimmed=false `
            /p:DebugType=None `
            /p:DebugSymbols=false `
            /p:Version=${{ steps.version.outputs.version }} `
            /p:InformationalVersion=${{ steps.version.outputs.display_version }}

      - name: Build installer package
        id: installer
        shell: pwsh
        run: |
          $publishDir = (Resolve-Path "src/VirtualDofMatrix.App/bin/Release/net8.0-windows/win-x64/publish").Path
          if (-not (Test-Path -LiteralPath $publishDir -PathType Container)) {
            throw "Publish directory not found for installer packaging: $publishDir"
          }

          dotnet publish installer/VirtualDofMatrix.Installer/VirtualDofMatrix.Installer.csproj `
            -c Release -r win-x64 --self-contained `
            /p:PublishSingleFile=true `
            /p:EnableCompressionInSingleFile=true `
            /p:IncludeNativeLibrariesForSelfExtract=true `
            /p:Version=${{ steps.version.outputs.version }} `
            /p:InstallerAppPublishDir="$publishDir\\"
          if ($LASTEXITCODE -ne 0) {
            throw "Installer package build failed."
          }

          $installerPublishDir = "installer/VirtualDofMatrix.Installer/bin/x64/Release/net8.0-windows/win-x64/publish"
          $installerExe = Join-Path $installerPublishDir "VirtualDofMatrix.Installer.exe"
          if (-not (Test-Path -LiteralPath $installerExe -PathType Leaf)) {
            throw "Published installer exe not found at $installerExe."
          }

          "installer_path=$installerExe" | Out-File -FilePath $env:GITHUB_OUTPUT -Encoding utf8 -Append

      - name: Stage release package
        id: package
        shell: pwsh
        run: |
          $publishDir = "src/VirtualDofMatrix.App/bin/Release/net8.0-windows/win-x64/publish"
          $stagingDir = "artifacts/staging"
          $assetName = "virtual-dof-matrix-${{ steps.version.outputs.artifact_tag }}-win-x64.zip"
          $manifestPath = "artifacts/release-manifest.effective.json"
          $exeName = "VirtualDofMatrix.App.exe"
          $exePath = Join-Path $publishDir $exeName

          if (-not (Test-Path -LiteralPath $exePath -PathType Leaf)) {
            throw "Published executable not found: $exePath"
          }

          $baseManifest = Get-Content -LiteralPath "release-manifest.json" -Raw | ConvertFrom-Json
          $effectiveManifest = [ordered]@{
            mappings = @(
              @{
                type = "file"
                from = $exeName
                to   = $exeName
              }
            ) + @($baseManifest.mappings)
          }

          New-Item -ItemType Directory -Path (Split-Path -Parent $manifestPath) -Force | Out-Null
          $effectiveManifest | ConvertTo-Json -Depth 10 | Out-File -LiteralPath $manifestPath -Encoding utf8

          ./tools/packaging/package-release.ps1 `
            -PublishOutput $publishDir `
            -ManifestPath $manifestPath `
            -StagingRoot $stagingDir `
            -AssetName $assetName

      - name: Commit README mirrors when packaging refreshes them
        id: sync_readme
        shell: pwsh
        run: |
          # Packaging rewrites README mirrors from docs/instructions.html when needed.
          # Auto-commit that sync so main always reflects the canonical instructions source.
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"

          $readmeChanged = (git status --porcelain -- README.md docs/README.md)
          if (-not [string]::IsNullOrWhiteSpace($readmeChanged)) {
            git add README.md docs/README.md
            git commit -m "docs: sync README mirrors from instructions during release packaging"
            git push origin HEAD:main
            Write-Host "README mirrors committed and pushed to main."
          }
          else {
            Write-Host "README mirrors already synchronized; no docs commit required."
          }

          $currentSha = (git rev-parse HEAD).Trim()
          "release_target=$currentSha" | Out-File -FilePath $env:GITHUB_OUTPUT -Encoding utf8 -Append

      - name: Create and push tag
        shell: pwsh
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"

          git tag -a "${{ steps.version.outputs.git_tag }}" -m "Build ${{ steps.version.outputs.git_tag }}"
          git push origin "${{ steps.version.outputs.git_tag }}"

      - name: Create GitHub release
        if: steps.version.outputs.is_release == 'true'
        shell: pwsh
        env:
          GH_TOKEN: ${{ github.token }}
          RELEASE_TAG: ${{ steps.version.outputs.git_tag }}
          RELEASE_TARGET: ${{ steps.sync_readme.outputs.release_target }}
          RELEASE_FILE: ${{ steps.package.outputs.artifact_path }}
          RELEASE_INSTALLER: ${{ steps.installer.outputs.installer_path }}
        run: |
          # Use the built-in GitHub CLI here so we avoid JavaScript action runtime deprecations (Node 20 -> 24 migration).
          $args = @(
            "release", "create",
            $env:RELEASE_TAG,
            $env:RELEASE_FILE,
            "--target", $env:RELEASE_TARGET,
            "--generate-notes"
          )
          if (-not [string]::IsNullOrWhiteSpace($env:RELEASE_INSTALLER) -and (Test-Path -LiteralPath $env:RELEASE_INSTALLER -PathType Leaf)) {
            $args += $env:RELEASE_INSTALLER
          }

          gh @args

      - name: Upload internal test build artifacts
        if: steps.version.outputs.is_release != 'true'
        uses: actions/upload-artifact@v4
        with:
          name: virtual-dof-matrix-${{ steps.version.outputs.artifact_tag }}
          retention-days: 30
          path: |
            ${{ steps.package.outputs.artifact_path }}
            ${{ steps.installer.outputs.installer_path }}
