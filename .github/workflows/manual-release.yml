name: Manual Release

on:
  workflow_dispatch:
    inputs:
      bump:
        description: "Version bump when override is empty"
        required: true
        default: patch
        type: choice
        options:
          - patch
          - minor
          - major
      version_override:
        description: "Optional explicit version (e.g. 0.2.0)"
        required: false
        type: string
      is_prerelease:
        description: "Publish as pre-release"
        required: true
        default: true
        type: boolean

permissions:
  contents: write

jobs:
  release:
    name: Build and publish release
    runs-on: windows-latest
    if: github.ref_name == 'main'

    steps:
      - name: Validate workflow branch
        if: github.ref_name != 'main'
        run: |
          Write-Error "This workflow only runs from main. Current ref: $env:GITHUB_REF_NAME"

      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: 8.0.x

      - name: Resolve release version
        id: version
        shell: pwsh
        env:
          INPUT_BUMP: ${{ inputs.bump }}
          INPUT_VERSION_OVERRIDE: ${{ inputs.version_override }}
        run: |
          $ErrorActionPreference = 'Stop'

          git fetch --tags --force

          $override = "$env:INPUT_VERSION_OVERRIDE".Trim()
          if ($override) {
            if ($override -notmatch '^\d+\.\d+\.\d+$') {
              throw "version_override must match N.N.N format, got '$override'"
            }
            $nextVersion = $override
          }
          else {
            $latestTag = git tag --list 'v*' --sort=-v:refname | Select-Object -First 1
            if (-not $latestTag) {
              $baseVersion = [Version]'0.0.0'
            }
            else {
              if ($latestTag -notmatch '^v(\d+\.\d+\.\d+)$') {
                throw "Latest tag '$latestTag' is not SemVer in vN.N.N format."
              }
              $baseVersion = [Version]$Matches[1]
            }

            switch ("$env:INPUT_BUMP") {
              'major' { $nextVersion = "{0}.{1}.{2}" -f ($baseVersion.Major + 1), 0, 0 }
              'minor' { $nextVersion = "{0}.{1}.{2}" -f $baseVersion.Major, ($baseVersion.Minor + 1), 0 }
              'patch' { $nextVersion = "{0}.{1}.{2}" -f $baseVersion.Major, $baseVersion.Minor, ($baseVersion.Build + 1) }
              default { throw "Unsupported bump value '$env:INPUT_BUMP'." }
            }
          }

          $tag = "v$nextVersion"
          if (git rev-parse $tag 2>$null) {
            throw "Tag '$tag' already exists."
          }

          "version=$nextVersion" | Out-File -FilePath $env:GITHUB_OUTPUT -Encoding utf8 -Append
          "tag=$tag" | Out-File -FilePath $env:GITHUB_OUTPUT -Encoding utf8 -Append

      - name: Build application
        shell: pwsh
        run: |
          dotnet restore VirtualDofMatrix.sln
          dotnet publish src/VirtualDofMatrix.App/VirtualDofMatrix.App.csproj `
            -c Release `
            -r win-x64 `
            --self-contained true `
            /p:DebugType=None `
            /p:DebugSymbols=false `
            /p:Version=${{ steps.version.outputs.version }}

      - name: Stage release package
        id: package
        shell: pwsh
        run: |
          $publishDir = "src/VirtualDofMatrix.App/bin/Release/net8.0-windows/win-x64/publish"
          $stagingDir = "artifacts/staging"
          $assetName = "virtual-dof-matrix-${{ steps.version.outputs.tag }}-win-x64.zip"

          ./tools/packaging/package-release.ps1 `
            -PublishOutput $publishDir `
            -ManifestPath "release-manifest.json" `
            -StagingRoot $stagingDir `
            -AssetName $assetName

      - name: Create and push tag
        shell: pwsh
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"

          git tag -a ${{ steps.version.outputs.tag }} -m "Release ${{ steps.version.outputs.tag }}"
          git push origin ${{ steps.version.outputs.tag }}

      - name: Create GitHub release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ steps.version.outputs.tag }}
          target_commitish: ${{ github.sha }}
          prerelease: ${{ inputs.is_prerelease }}
          generate_release_notes: true
          files: ${{ steps.package.outputs.artifact_path }}
